# Public announcement scenario:
# Information broadcast through normal channels. Spreads quickly via
# any tie but burns out fast — once everyone has heard, nobody bothers
# to share again. Edge weights are normalized to [0, 1].
name: Public Announcement
description: >
  Information distributed through public channels. Higher base
  transmission across all ties, but recipients quickly stop sharing
  because the information is no longer novel.
beta: 0.07        # higher base transmission per edge per step
gamma: 0.30       # high recovery — info goes stale fast
alpha: 1.0        # tie strength matters less for public info
steps: 30
runs: 200
