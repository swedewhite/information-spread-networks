# Synthetic influencer dataset — ENTIRELY FICTIONAL.
#
# Every person, company, conference, podcast, and project in this repository
# is invented for demonstration purposes. Any resemblance to real people or
# organizations is coincidental. See ETHICS.md for why the demo uses
# fictional data instead of real public figures.
#
# The dataset is hand-designed to have interesting structure: several
# sub-communities ("clusters") plus a handful of people who bridge them, so
# the centrality, structural-holes, diffusion, and seed-optimization views
# all have something to show.

